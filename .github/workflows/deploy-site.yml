name: Deploy the-cyclist-diary.fr to GH Pages
run-name: Déploiement du site

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      HUGO_CACHEDIR: /tmp/hugo_cache
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.149.0'
          extended: true
      - name: Setup GH Pages
        id: pages
        uses: actions/configure-pages@v5
      - uses: whywaita/actions-cache-s3@v2
        with:
          path: ${{ env.HUGO_CACHEDIR }}
          key: ${{ runner.os }}-hugomod
          restore-keys: |
            ${{ runner.os }}-hugo-modules
          aws-s3-bucket: the-cyclist-diary-cache
          aws-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.R2_ACCESS_KEY }}
          aws-endpoint: https://59d55d1a4dbc1f28fe6cd3d2d2036e4d.r2.cloudflarestorage.com
          aws-region: auto
          aws-s3-force-path-style: true
          aws-s3-bucket-endpoint: false
      - uses: whywaita/actions-cache-s3@v2
        with:
          path: resources
          key: ${{ runner.os }}-hugo-resources-${{ hashFiles('assets/**') }}
          restore-keys: |
            ${{ runner.os }}-hugo-resources-
          aws-s3-bucket: the-cyclist-diary-cache
          aws-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.R2_ACCESS_KEY }}
          aws-endpoint: https://59d55d1a4dbc1f28fe6cd3d2d2036e4d.r2.cloudflarestorage.com
          aws-region: auto
          aws-s3-force-path-style: true
          aws-s3-bucket-endpoint: false

      - name: Build
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Clean old cache on R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_ENDPOINT: https://59d55d1a4dbc1f28fe6cd3d2d2036e4d.r2.cloudflarestorage.com
        run: |
          echo "🧹 Nettoyage des anciens caches sur R2..."        
          
          # Pour chaque préfixe de cache (hugo-resources, hugo-modules)
          for prefix in "Linux-hugo-resources-" "Linux-hugomod"; do
            echo "Vérification du cache $prefix..."
            
            # Lister tous les objets avec ce préfixe, triés par date (plus récent en dernier)
            objects=$(aws s3api list-objects-v2 \
              --bucket the-cyclist-diary-cache \
              --prefix "$prefix" \
              --endpoint-url "$R2_ENDPOINT" \
              --query 'sort_by(Contents, &LastModified)[].Key' \
              --output text 2>/dev/null || echo "")
            
            if [ -z "$objects" ]; then
              echo "  Aucun cache trouvé pour $prefix"
              continue
            fi
            
            # Convertir en tableau
            cache_files=($objects)
            total=${#cache_files[@]}
            
            if [ $total -le 1 ]; then
              echo "  $total cache(s) trouvé(s), conservation de tous"
              continue
            fi
            
            # Garder le plus récent, supprimer le reste
            to_keep=1
            to_delete=$((total - to_keep))
            
            echo "  $total cache(s) trouvé(s), suppression des $to_delete plus ancien(s)..."
            
            for ((i=0; i<$to_delete; i++)); do
              key="${cache_files[$i]}"
              aws s3 rm "s3://the-cyclist-diary-cache/$key" --endpoint-url "$R2_ENDPOINT" 2>/dev/null && echo "    ✅ Supprimé: $key" || true
            done
          done
          
          echo "✅ Nettoyage du cache terminé !"

      - name: Install Pagefind
        run: npx -y pagefind@latest --site public

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Upload images to R2 
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.IMAGES_R2_ACCESS_KEY_ID }}
          R2_ACCESS_KEY: ${{ secrets.IMAGES_R2_ACCESS_KEY }}
          R2_BUCKET: the-cyclist-diary-images
          R2_ENDPOINT: https://59d55d1a4dbc1f28fe6cd3d2d2036e4d.r2.cloudflarestorage.com
        run: python3 scripts/upload-images-to-r2.py

      - name: Remove images from artifact (served from R2)
        run: |
          echo "Suppression des images de l'artifact (elles sont sur R2)"
          
          # Supprimer tous les WebP
          webp_count=$(find public -name "*.webp" | wc -l)
          find public -name "*.webp" -delete
          echo "✅ $webp_count fichiers WebP supprimés"
          
          # Supprimer les JPG/PNG sources des contenus (convertis en WebP)
          jpg_count=$(find public/adventures public/blog public/about -name "*.jpg" -o -name "*.png" 2>/dev/null | wc -l)
          find public/adventures public/blog public/about -name "*.jpg" -delete 2>/dev/null || true
          find public/adventures public/blog public/about -name "*.png" -delete 2>/dev/null || true
          echo "✅ $jpg_count fichiers JPG/PNG supprimés du contenu"
          
          echo "✅ Nettoyage terminé !"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: "https://the-cyclist-diary.fr"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4