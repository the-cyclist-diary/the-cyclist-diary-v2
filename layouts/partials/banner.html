
<nav class="navbar is-fixed-top is-transparent" role="navigation" aria-label="main navigation">
    <div class="navbar-brand">
        <a class="navbar-item" href="{{ relLangURL nil }}">
            <p class="title">
                The cyclist diary
            </p>
        </a>

        <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="site-navbar">
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
        </a>
    </div>

    <div class="navbar-menu" id="site-navbar">
        <div class="navbar-end has-text-weight-bold is-size-5">
            <!-- Search button for desktop -->
            <div class="navbar-item is-hidden-touch">
                <div id="search"></div>
            </div>
            <!-- Mobile search item (first in menu) -->
            <a class="navbar-item is-hidden-desktop" id="search-mobile">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem;">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                Rechercher
            </a>
            {{ range site.Menus.main }}
            {{ $url := relLangURL .URL }}
            {{ if isset .Params "format" | and .Page }}
            {{ $url = (.Page.OutputFormats.Get .Params.format).RelPermalink }}
            {{ end }}
            <a class="navbar-item white" href="{{ $url }}">{{ .Name }}</a>
            {{ end }}
        </div>
    </div>
</nav>


<script defer>
    document.addEventListener('DOMContentLoaded', () => {

        // Get all "navbar-burger" elements
        const $navbarBurgers = Array.prototype.slice.call(document.querySelectorAll('.navbar-burger'), 0);

        // Add a click event on each of them
        $navbarBurgers.forEach(el => {
            el.addEventListener('click', () => {

                // Get the target from the "data-target" attribute
                const target = el.dataset.target;
                const $target = document.getElementById(target);

                // Toggle the "is-active" class on both the "navbar-burger" and the "navbar-menu"
                el.classList.toggle('is-active');
                $target.classList.toggle('is-active');

            });
        });

    });
</script>
