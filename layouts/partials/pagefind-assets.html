<!-- Modal container for search -->
<div id="pagefind-modal" class="pagefind-modal" style="display: none;">
    <div class="pagefind-modal-backdrop"></div>
    <div class="pagefind-modal-content">
        <button class="pagefind-modal-close" aria-label='{{ i18n "search_close" }}'>&times;</button>
        <div id="pagefind-ui"></div>
    </div>
</div>

<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
<script data-cfasync="false" src="/pagefind/pagefind-ui.js" ></script>
<script data-cfasync="false">
    window.addEventListener('DOMContentLoaded', () => {
        // Wait for PagefindUI to be available
        // Pagefind UI is only available after running `npx pagefind --site public`
        if (typeof PagefindUI === 'undefined') {
            return;
        }
        const pagefindUI = new PagefindUI({
            element: "#pagefind-ui",
            showSubResults: true,
            showImages: false,
            excerptLength: 15,
            translations: {
                placeholder: "{{ i18n "search_placeholder" }}",
                clear_search: "{{ i18n "search_clear" }}",
                load_more: "{{ i18n "search_load_more" }}",
                search_label: "{{ i18n "search_label" }}",
                filters_label: "{{ i18n "search_filters" }}",
                zero_results: "{{ i18n "search_zero" }}",
                many_results: "{{ i18n "search_many" }}",
                one_result: "{{ i18n "search_one" }}",
                alt_search: "{{ i18n "search_alt" }}",
                search_suggestion: "{{ i18n "search_suggestion" }}",
                searching: "{{ i18n "search_searching" }}"
            }
        });

        // Open modal function
        const openSearchModal = () => {
            const modal = document.getElementById('pagefind-modal');
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
            // Focus on search input after a short delay to ensure it's rendered
            setTimeout(() => {
                const input = document.querySelector('#pagefind-ui input');
                if (input) input.focus();
            }, 100);
        };

        // Close modal function
        const closeSearchModal = () => {
            const modal = document.getElementById('pagefind-modal');
            modal.style.display = 'none';
            document.body.style.overflow = '';
            // Clear the search
            const input = document.querySelector('#pagefind-ui input');
            if (input) input.value = '';
        };

        // Desktop button
        const searchButton = document.getElementById('search');
        if (searchButton) {
            searchButton.addEventListener('click', openSearchModal);
        }

        // Mobile button
        const searchMobile = document.getElementById('search-mobile');
        if (searchMobile) {
            searchMobile.addEventListener('click', (e) => {
                e.preventDefault();
                // Close the mobile menu
                document.querySelector('.navbar-menu').classList.remove('is-active');
                document.querySelector('.navbar-burger').classList.remove('is-active');
                // Open search modal
                openSearchModal();
            });
        }

        // Close button
        const closeButton = document.querySelector('.pagefind-modal-close');
        if (closeButton) {
            closeButton.addEventListener('click', closeSearchModal);
        }

        // Backdrop click
        const backdrop = document.querySelector('.pagefind-modal-backdrop');
        if (backdrop) {
            backdrop.addEventListener('click', closeSearchModal);
        }

        // ESC key to close
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const modal = document.getElementById('pagefind-modal');
                if (modal && modal.style.display === 'block') {
                    closeSearchModal();
                }
            }
        });
    });
</script>
