{{/* categories-badge.html — badges de catégories cliquables */}}
{{ with .Params.categories }}
<span class="categories">
    {{ range . }}
    {{ with $.Site.GetPage (printf "/categories/%s" (. | urlize)) }}
    <a href="{{ .RelPermalink }}" class="tag is-warning is-light">{{ .Title }}</a>
    {{ end }}
    {{ end }}
</span>
{{ end }}
