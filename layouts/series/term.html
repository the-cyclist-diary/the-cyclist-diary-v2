{{ define "main" }}
<div class="section">
    {{ partial "breadcrumb.html" . }}
    <div class="container">
        <div class="content">
            <h1 class="title">{{ i18n "series_label" }} {{ .Title }}</h1>
            <p class="subtitle">{{ i18n "articles_in_series" (len .Pages) }}</p>
        </div>
    </div>
</div>
<div class="container">
    {{ range $i, $page := .Pages.ByDate }}
    {{ partial "serie-summary.html" (dict "context" $page "index" $i "displaySection" false) }}
    {{ end }}
</div>

{{ end }}
