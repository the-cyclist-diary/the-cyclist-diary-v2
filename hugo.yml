baseURL: https://the-cyclist-diary.fr
title: The cyclist diary
defaultContentLanguage: fr
defaultContentLanguageInSubdir: false
timeout: 120
capitalizeListTitles: false

# URL de base pour les images hébergées sur R2 (CloudFlare)
params:
  imagesCDN: "https://images.the-cyclist-diary.fr"

# Configuration des taxonomies
taxonomies:
  category: categories
  serie: series

languages:
  fr:
    locale: fr-FR
    label: Français
    weight: 1
    menu:
      main:
        - name: Sur le vif
          pageRef: /adventures
          weight: 1
        - name: Articles
          pageRef: /blog
          weight: 2
        - name: A propos
          pageRef: /about
          weight: 3
  en:
    locale: en-GB
    label: English
    weight: 2
    menu:
      main:
        - name: On the go
          pageRef: /adventures
          weight: 1
        - name: Blog
          pageRef: /blog
          weight: 2
        - name: About
          pageRef: /about
          weight: 3

module:
  mounts:
    # Les images restent dans assets/ pour être traitées par Hugo
    - source: "assets"
      target: "assets"
    # CSS et fonts copiés directement dans static/
    - source: "assets/css"
      target: "static/css"
    - source: "assets/fonts"
      target: "static/fonts"
    - source: "static"
      target: "static"

imaging:
  quality: 80
  resampleFilter: "Lanczos"

markup:
  tableOfContents:
    startLevel: 1
    endLevel: 3
    ordered: true
  goldmark:
    parser:
      attribute:
        title: true
